<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #000; transition: background 1.5s ease-in-out; overflow: hidden;
        }
        
        body.white-bg { background: #fff; }
        body.blue-bg { background: #007AFF; }

        #brand-wrapper { 
            display: flex; justify-content: center; align-items: center;
            width: 500px; font-family: sans-serif; font-size: 5rem; 
            font-weight: 700; color: #fff; transition: color 1.5s ease;
            z-index: 2;
        }
        .white-bg #brand-wrapper { color: #000; }
        .blue-bg #brand-wrapper { color: #fff; }

        #sliding-part { 
            width: 0; overflow: hidden; white-space: nowrap;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .expanded #sliding-part { width: 330px; }

        .bubble { 
            position: fixed; bottom: -150px; background: #007AFF; 
            border-radius: 50%; opacity: 0.7; z-index: 1;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-120vh); }
        }
    </style>
</head>
<body>

<div id="brand-wrapper">
    <span>x</span><span id="sliding-part">enonOS</span>
</div>

<script>
    const wrapper = document.getElementById('brand-wrapper');

    // 1. Slide-out
    setTimeout(() => { wrapper.classList.add('expanded'); }, 800);

    // 2. Transition to white
    setTimeout(() => { document.body.classList.add('white-bg'); }, 2200);

    // 3. Bubbles spawn with staggered delay
    setTimeout(() => {
        for (let i = 0; i < 40; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 80 + 40 + 'px';
            b.style.width = size;
            b.style.height = size;
            b.style.left = Math.random() * 100 + 'vw';
            
            // STAGGERING: Each bubble gets a different animation delay
            const delay = Math.random() * 4; 
            b.style.animation = `float 5s ease-in ${delay}s forwards`;
            
            document.body.appendChild(b);
        }
    }, 3000);

    // 4. Blue transition
    setTimeout(() => {
        document.body.classList.add('blue-bg');
    }, 7000); 
</script>
</body>
</html>
