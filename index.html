<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #000; transition: background 1.5s ease; overflow: hidden;
        }
        
        #brand { 
            display: flex; align-items: center; font-family: sans-serif; font-size: 5rem; 
            color: #fff; font-weight: 700; white-space: nowrap; z-index: 10;
            transition: color 1s ease;
        }

        /* Slide effect */
        #sliding-part { 
            width: 0; overflow: hidden; display: inline-block;
            transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .expanded #sliding-part { width: 440px; }

        /* Bubbles */
        .bubble { 
            position: absolute; bottom: -100px; background: #007AFF; 
            border-radius: 50%; opacity: 0.8; z-index: 5;
            transition: transform 3s ease-out;
        }
    </style>
</head>
<body>

<div id="brand">
    <span>x</span><span id="sliding-part">enonOS</span>
</div>

<script>
    const brand = document.getElementById('brand');
    const container = document.getElementById('brand');

    // 1. Trigger slide-out
    setTimeout(() => { container.classList.add('expanded'); }, 500);

    // 2. Spawn large bubbles that collect at the top
    setTimeout(() => {
        for (let i = 0; i < 40; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 80 + 40 + 'px'; // Larger bubbles
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + 'vw';
            b.style.bottom = '-100px';
            document.body.appendChild(b);

            // Move to top
            setTimeout(() => {
                b.style.transform = 'translateY(-110vh)';
            }, 500);
        }
    }, 1500);

    // 3. Final color flip when bubbles hit the top
    setTimeout(() => {
        document.body.style.backgroundColor = '#007AFF'; // Background turns blue
        brand.style.color = '#fff'; // Text turns white
    }, 4000);
</script>
</body>
</html>
